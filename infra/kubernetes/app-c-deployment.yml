apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-c
  labels:
    app: app-c
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-c
  template:
    metadata:
      labels:
        app: app-c
    spec:
      containers:
      - name: app-c-server
        image: sso-platform/app-c:latest
        ports:
        - containerPort: 3003
        env:
        - name: NODE_ENV
          value: production
        - name: PINGONE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: pingone-credentials
              key: client-id
        - name: PINGONE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: pingone-credentials
              key: client-secret
        - name: PINGONE_ENVIRONMENT_ID
          valueFrom:
            configMapKeyRef:
              name: pingone-config
              key: environment-id
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: app-c-service
spec:
  selector:
    app: app-c
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3003
  type: LoadBalancer
