apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-a
  labels:
    app: app-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-a
  template:
    metadata:
      labels:
        app: app-a
    spec:
      containers:
      - name: app-a-server
        image: sso-platform/app-a:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: production
        - name: PINGONE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: pingone-credentials
              key: client-id
        - name: PINGONE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: pingone-credentials
              key: client-secret
        - name: PINGONE_ENVIRONMENT_ID
          valueFrom:
            configMapKeyRef:
              name: pingone-config
              key: environment-id
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: app-a-service
spec:
  selector:
    app: app-a
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
  type: LoadBalancer
