apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-server
  labels:
    app: idp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idp-server
  template:
    metadata:
      labels:
        app: idp-server
    spec:
      containers:
      - name: idp-server
        image: sso-platform/idp-server:latest
        ports:
        - containerPort: 4000
        env:
        - name: NODE_ENV
          value: production
        - name: PINGONE_ENVIRONMENT_ID
          valueFrom:
            configMapKeyRef:
              name: pingone-config
              key: environment-id
        - name: PINGONE_ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: pingone-credentials
              key: admin-token
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: idp-server-service
spec:
  selector:
    app: idp-server
  ports:
  - protocol: TCP
    port: 80
    targetPort: 4000
  type: LoadBalancer
